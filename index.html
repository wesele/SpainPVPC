<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西班牙电价展示 - Spain PVPC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 6px 4px;
            text-align: center;
            font-size: 11px;
        }

        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }

        .hour-header {
            background: #f9f9f9;
            font-weight: 600;
            color: #555;
            width: 50px;
            min-width: 50px;
        }

        .date-header {
            padding: 6px 4px;
            font-weight: 600;
            color: #333;
            background: #f5f5f5;
        }

        .date-label {
            font-weight: 600;
            font-size: 12px;
            color: #222;
            line-height: 1.2;
        }

        .weekday {
            font-size: 10px;
            color: #888;
            font-weight: normal;
            margin-top: 1px;
        }

        .price-cell {
            padding: 8px 4px;
            font-weight: 500;
            color: #333;
            transition: all 0.15s ease;
            position: relative;
        }

        .price-cell.current-hour {
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
            animation: pulse 2s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 107, 107, 0.9);
            }
        }

        .price-value {
            display: block;
            font-size: 11px;
            font-weight: 600;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .container {
                padding: 15px;
            }

            th, td {
                padding: 5px 3px;
                font-size: 10px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 3px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 12px;
            }

            th, td {
                padding: 4px 2px;
                font-size: 9px;
            }

            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 西班牙电价查看</h1>

        <div class="table-wrapper">
            <table id="priceTable">
                <thead>
                    <tr id="dateHeader"></tr>
                </thead>
                <tbody id="priceBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        /**
         * 根据电价生成渐变色背景
         * price单位: €/MWh (即 1000 * €/kWh)
         * 0.03元/kWh (30) -> 极深绿
         * 0.15元/kWh (150) -> 橙红
         * 0.50元/kWh (500) -> 极深红
         */
        function getPriceColor(price) {
            const s = 100; // 饱和度最大，视觉冲击力强
            let h, l;
            
            if (price <= 30) {
                // 极低价：极深绿
                h = 150;
                l = 18;
            } else if (price < 100) {
                // 30 - 100: 深绿到亮绿
                let r = (price - 30) / 70;
                h = 150 - r * 30; // 150 -> 120
                l = 18 + r * 22;  // 18 -> 40
            } else if (price < 150) {
                // 100 - 150: 绿到橙 (0.15是个关键节点，让它更红一点)
                let r = (price - 100) / 50;
                h = 120 - r * 90; // 120 -> 30 (橙红)
                l = 40 + r * 10;  // 40 -> 50
            } else if (price < 350) {
                // 150 - 350: 橙红到红
                let r = (price - 150) / 200;
                h = 30 - r * 30;  // 30 -> 0 (红)
                l = 50 - r * 20;  // 50 -> 30
            } else {
                // 350+: 极深红
                let r = Math.min(1, (price - 350) / 250);
                h = 0;
                l = 30 - r * 15;  // 30 -> 15
            }
            
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        /**
         * 计算对比文字颜色
         */
        function getTextColor(price) {
            // 根据上面的亮度逻辑：
            // 极低价(l=18)和极高价(l<30)需要白色
            // 中间部分(l接近50)需要黑色
            if (price < 70 || price > 220) {
                return 'white';
            }
            return '#111';
        }

        /**
         * 获取星期几的名称
         */
        function getWeekdayName(dayIndex) {
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return weekdays[dayIndex];
        }

        /**
         * 格式化日期为 YYYY-MM-DD
         */
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        /**
         * 检查是否有任何可用数据
         */
        function isDataComplete(data) {
            return data && Object.keys(data).length > 0;
        }

        /**
         * 从本地 pvpc.json 读取数据
         */
        async function loadLocalData() {
            try {
                const response = await fetch('pvpc.json');
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (error) {
                console.log('本地数据不可用:', error);
            }
            return null;
        }

        /**
         * 从 tarifaluzhora.es API 获取数据
         */
        async function fetchFromAPI(date) {
            try {
                const dateStr = formatDate(date);
                const response = await fetch(`https://api.tarifaluzhora.es/v1/prices/${dateStr}`);
                if (response.ok) {
                    const prices = await response.json();
                    
                    // 转换为小时价格数组 (€/MWh)
                    return prices.map(item => {
                        // 将 €/kWh 转换为 €/MWh (乘以 1000)
                        return parseFloat((item.price * 1000).toFixed(4));
                    });
                }
            } catch (error) {
                console.error(`获取 ${dateStr} 数据失败:`, error);
            }
            return null;
        }

        /**
         * 获取完整的过去10天数据
         */
        async function getPriceData() {
            let data = await loadLocalData();
            
            if (data && isDataComplete(data)) {
                return data;
            }

            data = data || {};
            const today = new Date();
            let updated = false;

            for (let dayOffset = 0; dayOffset < 10; dayOffset++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (9 - dayOffset));
                const dateStr = formatDate(date);

                if (!data[dateStr] || data[dateStr].length < 24) {
                    const prices = await fetchFromAPI(date);
                    if (prices) {
                        data[dateStr] = prices;
                        updated = true;
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            if (updated) {
                localStorage.setItem('pvpc_data', JSON.stringify(data));
                try {
                    await fetch('api/save-pvpc', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (error) {
                    console.log('后端保存失败，但本地已保存:', error);
                }
            }

            return data;
        }

        /**
         * 计算可以显示的天数
         */
        function calculateVisibleDays() {
            const containerWidth = document.querySelector('.container').offsetWidth;
            const hourColumnWidth = 50; // 时间列宽度
            const dateColumnMinWidth = 55; // 日期列最小宽度
            const padding = 40; // 容器内边距
            
            const availableWidth = containerWidth - hourColumnWidth - padding;
            const maxDays = Math.floor(availableWidth / dateColumnMinWidth);
            
            // 限制在1-10天之间
            return Math.max(1, Math.min(10, maxDays));
        }

        /**
         * 渲染价格表格
         */
        function renderPriceTable(priceData) {
            const today = new Date();
            const currentHour = today.getHours();
            
            // 计算可以显示的天数
            const visibleDays = calculateVisibleDays();

            // 获取过去N天的日期数组
            const dates = [];
            for (let dayOffset = 0; dayOffset < visibleDays; dayOffset++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (visibleDays - 1 - dayOffset));
                const dateStr = formatDate(date);
                dates.push({
                    dateStr: dateStr,
                    date: date,
                    day: date.getDate(),
                    month: date.getMonth() + 1,
                    weekday: getWeekdayName(date.getDay())
                });
            }

            // 渲染日期头行
            const dateHeader = document.getElementById('dateHeader');
            dateHeader.innerHTML = ''; // 清空
            
            const headerCell = document.createElement('th');
            headerCell.className = 'hour-header';
            headerCell.textContent = '时间';
            dateHeader.appendChild(headerCell);

            dates.forEach(dateInfo => {
                const th = document.createElement('th');
                th.className = 'date-header';
                th.innerHTML = `<div class="date-label">${dateInfo.month}/${dateInfo.day}</div><div class="weekday">${dateInfo.weekday}</div>`;
                dateHeader.appendChild(th);
            });

            // 渲染每小时行
            const priceBody = document.getElementById('priceBody');
            priceBody.innerHTML = ''; // 清空
            
            for (let hour = 0; hour < 24; hour++) {
                const tr = document.createElement('tr');

                // 时间标签
                const hourCell = document.createElement('td');
                hourCell.className = 'hour-header';
                hourCell.textContent = `${String(hour).padStart(2, '0')}:00`;
                tr.appendChild(hourCell);

                // 每天的电价
                dates.forEach(dateInfo => {
                    const td = document.createElement('td');
                    const prices = priceData[dateInfo.dateStr];
                    const price = prices && prices[hour] ? prices[hour] : null;

                    td.className = 'price-cell';
                    
                    // 判断是否是当前时段
                    const isToday = dateInfo.dateStr === formatDate(today);
                    const isCurrentHour = isToday && hour === currentHour;
                    
                    if (isCurrentHour) {
                        td.classList.add('current-hour');
                    }
                    
                    if (price !== null) {
                        const bgColor = getPriceColor(price);
                        const textColor = getTextColor(price);

                        td.style.backgroundColor = bgColor;
                        td.style.color = textColor;
                        td.innerHTML = `<span class="price-value">€${(price / 1000).toFixed(3)}</span>`;
                    } else {
                        td.textContent = '-';
                        td.style.backgroundColor = '#f0f0f0';
                    }

                    tr.appendChild(td);
                });

                priceBody.appendChild(tr);
            }
        }

        /**
         * 初始化页面
         */
        async function init() {
            try {
                const priceData = await getPriceData();
                renderPriceTable(priceData);
                
                // 窗口大小改变时重新渲染
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        renderPriceTable(priceData);
                    }, 200);
                });
            } catch (error) {
                console.error('初始化失败:', error);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
