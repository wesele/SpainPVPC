<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西班牙电价展示 - Spain PVPC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .status {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 11px;
            min-height: 18px;
        }

        .status.loading {
            color: #3498db;
        }

        .status.success {
            color: #27ae60;
        }

        .status.warning {
            color: #f39c12;
        }

        .status.error {
            color: #e74c3c;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box {
            width: 24px;
            height: 24px;
            border-radius: 3px;
            border: 1px solid #ddd;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 6px 4px;
            text-align: center;
            font-size: 11px;
        }

        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }

        .hour-header {
            background: #f9f9f9;
            font-weight: 600;
            color: #555;
            width: 50px;
            min-width: 50px;
        }

        .date-header {
            padding: 6px 4px;
            font-weight: 600;
            color: #333;
            background: #f5f5f5;
            min-width: 70px;
        }

        .date-label {
            font-weight: 600;
            font-size: 12px;
            color: #222;
            line-height: 1.2;
        }

        .weekday {
            font-size: 10px;
            color: #888;
            font-weight: normal;
            margin-top: 1px;
        }

        .price-cell {
            padding: 8px 4px;
            font-weight: 500;
            color: #333;
            cursor: help;
            transition: all 0.15s ease;
            position: relative;
            min-width: 50px;
        }

        .price-cell:hover {
            transform: scale(1.08);
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .price-value {
            display: block;
            font-size: 11px;
            font-weight: 600;
        }

        .info-text {
            text-align: center;
            color: #888;
            font-size: 11px;
            margin-top: 12px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .container {
                padding: 15px;
            }

            th, td {
                padding: 5px 3px;
                font-size: 10px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 3px;
            }

            .legend {
                gap: 12px;
                margin-bottom: 12px;
                font-size: 11px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 12px;
            }

            .legend {
                gap: 10px;
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
                font-size: 9px;
            }

            .legend-box {
                width: 20px;
                height: 20px;
            }

            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 西班牙电价查看</h1>
        <p class="subtitle">Spain PVPC - Precio Promedio Ponderado de la Electricidad</p>
        <div class="status" id="status"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box" style="background: #27ae60;"></div>
                <span>&lt;0.05</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background: #2ecc71;"></div>
                <span>0.05-0.10</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background: #f1c40f;"></div>
                <span>0.10-0.15</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background: #f39c12;"></div>
                <span>0.15-0.20</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background: #e74c3c;"></div>
                <span>0.20-0.25</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background: #c0392b;"></div>
                <span>&gt;0.25</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="priceTable">
                <thead>
                    <tr id="dateHeader"></tr>
                </thead>
                <tbody id="priceBody"></tbody>
            </table>
        </div>

        <div class="info-text">
            💡 过去10天每小时电价 (€/MWh) | 鼠标悬停查看具体数值
        </div>
    </div>

    <script>
        /**
         * 设置状态信息
         */
        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        /**
         * 根据电价生成渐变色背景
         */
        function getPriceColor(price) {
            let r, g, b;

            if (price < 0.05) {
                r = 39;
                g = 174;
                b = 96;
            } else if (price < 0.10) {
                const ratio = (price - 0.05) / 0.05;
                r = Math.round(39 + (241 - 39) * ratio);
                g = Math.round(174 + (196 - 174) * ratio);
                b = Math.round(96 + (30 - 96) * ratio);
            } else if (price < 0.15) {
                r = 241;
                g = 196;
                b = 30;
            } else if (price < 0.20) {
                const ratio = (price - 0.15) / 0.05;
                r = Math.round(241 - (100 - 241) * ratio);
                g = Math.round(196 - (76 - 196) * ratio);
                b = Math.round(30 - (44 - 30) * ratio);
            } else if (price < 0.25) {
                r = 231;
                g = 76;
                b = 60;
            } else {
                r = 192;
                g = 57;
                b = 43;
            }

            return `rgb(${r}, ${g}, ${b})`;
        }

        /**
         * 计算对比文字颜色
         */
        function getTextColor(price) {
            return price < 0.15 ? '#333' : 'white';
        }

        /**
         * 获取星期几的名称
         */
        function getWeekdayName(dayIndex) {
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return weekdays[dayIndex];
        }

        /**
         * 格式化日期为 YYYY-MM-DD
         */
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        /**
         * 检查是否有足够的完整数据（过去10天）
         */
        function isDataComplete(data) {
            const today = new Date(2026, 3, 25);
            for (let dayOffset = 0; dayOffset < 10; dayOffset++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (9 - dayOffset));
                const dateStr = formatDate(date);
                
                if (!data[dateStr] || data[dateStr].length < 24) {
                    return false;
                }
            }
            return true;
        }

        /**
         * 从本地 pvpc.json 读取数据
         */
        async function loadLocalData() {
            try {
                const response = await fetch('pvpc.json');
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (error) {
                console.log('本地数据不可用:', error);
            }
            return null;
        }

        /**
         * 从 tarifaluzhora.es API 获取数据
         */
        async function fetchFromAPI(date) {
            try {
                const dateStr = formatDate(date);
                const response = await fetch(`https://api.tarifaluzhora.es/v1/prices/${dateStr}`);
                if (response.ok) {
                    const prices = await response.json();
                    
                    // 转换为小时价格数组 (€/MWh)
                    return prices.map(item => {
                        // 将 €/kWh 转换为 €/MWh (乘以 1000)
                        return parseFloat((item.price * 1000).toFixed(4));
                    });
                }
            } catch (error) {
                console.error(`获取 ${dateStr} 数据失败:`, error);
            }
            return null;
        }

        /**
         * 获取完整的过去10天数据
         */
        async function getPriceData() {
            setStatus('<span class="loader"></span> 正在加载数据...', 'loading');

            // 先尝试从本地加载
            let data = await loadLocalData();
            
            if (data && isDataComplete(data)) {
                setStatus('✓ 使用本地数据', 'success');
                return data;
            }

            // 本地数据不完整，从 API 获取
            setStatus('<span class="loader"></span> 从网络获取数据...', 'loading');
            
            data = data || {};
            const today = new Date(2026, 3, 25);
            let updated = false;

            for (let dayOffset = 0; dayOffset < 10; dayOffset++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (9 - dayOffset));
                const dateStr = formatDate(date);

                if (!data[dateStr] || data[dateStr].length < 24) {
                    const prices = await fetchFromAPI(date);
                    if (prices) {
                        data[dateStr] = prices;
                        updated = true;
                    }
                    // 防止频繁请求
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            if (updated) {
                // 将获取的数据保存到本地存储
                localStorage.setItem('pvpc_data', JSON.stringify(data));
                
                // 尝试发送到后端保存到 GitHub
                try {
                    await fetch('api/save-pvpc', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    setStatus('✓ 已获取最新数据并保存', 'success');
                } catch (error) {
                    setStatus('✓ 已获取最新数据 (本地保存)', 'warning');
                    console.log('后端保存失败，但本地已保存:', error);
                }
            } else {
                setStatus('✓ 数据已就绪', 'success');
            }

            return data;
        }

        /**
         * 渲染价格表格
         */
        function renderPriceTable(priceData) {
            const today = new Date(2026, 3, 25);

            // 获取过去10天的日期数组
            const dates = [];
            for (let dayOffset = 0; dayOffset < 10; dayOffset++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (9 - dayOffset));
                const dateStr = formatDate(date);
                dates.push({
                    dateStr: dateStr,
                    date: date,
                    day: date.getDate(),
                    month: date.getMonth() + 1,
                    weekday: getWeekdayName(date.getDay())
                });
            }

            // 渲染日期头行
            const dateHeader = document.getElementById('dateHeader');
            dateHeader.innerHTML = ''; // 清空
            
            const headerCell = document.createElement('th');
            headerCell.className = 'hour-header';
            headerCell.textContent = '时间';
            dateHeader.appendChild(headerCell);

            dates.forEach(dateInfo => {
                const th = document.createElement('th');
                th.className = 'date-header';
                th.innerHTML = `<div class="date-label">${dateInfo.month}/${dateInfo.day}</div><div class="weekday">${dateInfo.weekday}</div>`;
                dateHeader.appendChild(th);
            });

            // 渲染每小时行
            const priceBody = document.getElementById('priceBody');
            priceBody.innerHTML = ''; // 清空
            
            for (let hour = 0; hour < 24; hour++) {
                const tr = document.createElement('tr');

                // 时间标签
                const hourCell = document.createElement('td');
                hourCell.className = 'hour-header';
                hourCell.textContent = `${String(hour).padStart(2, '0')}:00`;
                tr.appendChild(hourCell);

                // 每天的电价
                dates.forEach(dateInfo => {
                    const td = document.createElement('td');
                    const prices = priceData[dateInfo.dateStr];
                    const price = prices && prices[hour] ? prices[hour] / 1000 : null;

                    td.className = 'price-cell';
                    
                    if (price !== null) {
                        const bgColor = getPriceColor(price);
                        const textColor = getTextColor(price);

                        td.style.backgroundColor = bgColor;
                        td.style.color = textColor;
                        td.title = `${dateInfo.month}/${dateInfo.day} ${String(hour).padStart(2, '0')}:00 - €${price.toFixed(4)}/kWh`;
                        td.innerHTML = `<span class="price-value">€${price.toFixed(2)}</span>`;
                    } else {
                        td.textContent = '-';
                        td.style.backgroundColor = '#f0f0f0';
                    }

                    tr.appendChild(td);
                });

                priceBody.appendChild(tr);
            }
        }

        /**
         * 初始化页面
         */
        async function init() {
            try {
                const priceData = await getPriceData();
                renderPriceTable(priceData);
            } catch (error) {
                setStatus('❌ 加载数据失败，请刷新页面重试', 'error');
                console.error('初始化失败:', error);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
